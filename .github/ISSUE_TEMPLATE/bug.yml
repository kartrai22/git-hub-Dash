name: Bug
description: Report a defect
title: "[BUG] "
labels: ["Bug"]
body:
  - type: textarea
    attributes:
      label: Steps to Reproduce
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Result
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual Result
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
